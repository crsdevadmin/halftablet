version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Committed lockfile is corrupted (empty version fields) — resolve fresh
        - rm -f package-lock.json
        - npm install --no-audit --no-fund
        - npx prisma generate
    build:
      commands:
        # Apply any pending migrations to RDS, seed (idempotent upserts), then build
        - npx prisma migrate deploy
        - npx prisma db seed
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
