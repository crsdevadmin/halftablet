version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Committed lockfile is corrupted (empty version fields) — resolve fresh
        - rm -f package-lock.json
        - npm install --no-audit --no-fund
        - npx prisma generate
    build:
      commands:
        # Sync schema to RDS (no migration files in repo), seed (idempotent upserts), then build
        - npx prisma db push --accept-data-loss
        - npx prisma db seed
        # Amplify env vars exist only at build time — bake them in for the SSR runtime
        - env | grep -e DATABASE_URL -e NEXTAUTH_SECRET -e NEXTAUTH_URL -e OTP_DEBUG -e ANTHROPIC_API_KEY -e S3_BUCKET -e REGION >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
